<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育專用 Gemini 提示詞產生器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 隱藏捲軸但保留捲動功能，讓介面更乾淨 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 font-sans p-4 md:p-6">

  <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 border-b border-gray-200 bg-white gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">教育專用 Gemini 提示詞產生器</h1>
        <p class="text-sm text-gray-500 mt-1">基於 Persona, Task, Context, Format 框架設計</p>
      </div>
      <a href="https://gemini.google.com/" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm whitespace-nowrap">
        開啟 Gemini
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      </a>
    </div>

    <div class="flex flex-col md:flex-row">
      <!-- Sidebar -->
      <div class="w-full md:w-1/3 border-r border-gray-200 bg-gray-50/50 flex flex-col h-[300px] md:h-auto">
        <!-- Role Tabs -->
        <div class="flex p-4 border-b border-gray-200 gap-2 shrink-0">
          <button id="btn-teacher" class="flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-blue-100 text-blue-700 border border-blue-200">
            教師情境
          </button>
          <button id="btn-student" class="flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-100">
            學生情境
          </button>
        </div>

        <!-- Template List -->
        <div id="template-list" class="p-4 space-y-2 overflow-y-auto no-scrollbar flex-grow">
          <!-- 列表由 JS 動態生成 -->
        </div>
      </div>

      <!-- Main Editor -->
      <div class="w-full md:w-2/3 p-6 flex flex-col bg-white min-h-[500px]">
        <h2 id="editor-title" class="text-lg font-bold mb-4 text-gray-800">編輯提示詞</h2>
        <div class="flex-grow flex flex-col relative">
          <textarea id="prompt-textarea" class="w-full h-full min-h-[350px] p-4 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none text-gray-700 text-sm leading-relaxed" placeholder="在此編輯提示詞..."></textarea>
        </div>
        
        <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <p class="text-xs text-gray-500">請將中括號 <span class="font-mono bg-gray-100 px-1 rounded">[ ]</span> 內的文字替換為實際需求內容</p>
          <button id="btn-copy" class="flex items-center gap-2 px-6 py-2.5 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition-colors font-medium text-sm w-full sm:w-auto justify-center">
            <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            <svg id="icon-check" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            <span id="text-copy">複製提示詞</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const templates = {
      teacher: [
        { id: 't1', title: '教案設計', content: '角色：你是一位擁有[填入年資]年經驗的[填入階段/科目]老師。\n任務：請幫我設計一堂[填入時間長度]的課程教案。\n背景：課程主題是[填入主題]，學生程度約為[填入程度]，希望包含[填入特定教學法或活動]。\n格式：請以表格呈現，包含「時間分配」、「教學內容」、「師生活動」與「評量方式」。' },
        { id: 't2', title: '考題生成', content: '角色：你是一位嚴謹且熟悉素養導向命題的專家。\n任務：請根據[填入課程單元/主題]，產出[填入題數]道選擇題與[填入題數]道簡答題。\n背景：測驗對象是[填入年級]的學生，題目需測驗學生對[填入核心概念]的理解，而非死記硬背。請包含誘答力強的選項。\n格式：列出題目與選項，並在文件最後提供標準答案與詳解。' },
        { id: 't3', title: '學生評語撰寫', content: '角色：你是一位具備同理心且善於鼓勵學生的導師。\n任務：請協助我撰寫期末成績單的學生評語。\n背景：該名學生在[填入優點或傑出表現]表現優異，但在[填入需要改進的領域]需要加強。他的個性特質是[填入特質]。\n格式：產生3種不同語氣（鼓勵為主、具體建議為主、期許未來為主）的評語範本，字數約[填入字數]字。' },
        { id: 't4', title: '課堂活動發想', content: '角色：你是一位充滿創意、擅長遊戲化教學的課程設計師。\n任務：請提供[填入數量]個能在課堂上執行的互動活動。\n背景：課程主題是[填入主題]，課堂時間僅剩[填入時間]分鐘，無須準備複雜教具，目標是確認學生是否有吸收剛才講授的內容。\n格式：依序列出活動名稱、執行步驟、所需時間與預期效果。' },
        { id: 't5', title: '班級經營策略', content: '角色：你是一位資深輔導老師與班級經營專家。\n任務：請提供班級經營與輔導策略。\n背景：班上有學生[填入具體行為，如：上課經常擾亂秩序/不交作業]，已經影響到[填入影響情況]。\n格式：列出學生行為背後的可能原因，提供3個具體且溫和堅定的應對步驟，以及後續的預防措施。' },
        { id: 't6', title: '親師溝通草稿', content: '角色：你是一位善於溝通、具備同理心的班導師。\n任務：請幫我撰寫一封給家長的[填入信件類型，如：通知書/關懷信]。\n背景：目的是說明[填入事件或學生狀況]，語氣需要[填入期望語氣，如：溫和堅定/誠懇委婉]。\n格式：專業的電子郵件/書面信件格式，包含主旨、問候語、正文與結語。' },
        { id: 't7', title: '引導式學習單設計', content: '角色：你是一位專業的素養導向教材發展專家。\n任務：請協助設計一份[填入科目]科的學習單內容。\n背景：單元是[填入單元名稱]，對象是[填入年級]學生，目標是引導學生思考[填入核心問題或概念]。\n格式：依序列出「引起動機」、「核心問題探究（包含3個層次漸進的問題）」與「進階挑戰」三個區塊的文字內容。' },
        { id: 't8', title: '教學反思與檢討', content: '角色：你是一位經驗豐富的教學督導與反思教練。\n任務：請引導我進行課後教學反思。\n背景：我剛上完一堂[填入科目/單元]課，我覺得在[填入成功或失敗的具體環節]表現得[填入感受]。\n格式：請提出3個具深度的引導式問題讓我思考，並提供一個未來改進的行動計畫框架。' }
      ],
      student: [
        { id: 's1', title: '複雜概念解釋', content: '角色：你是一位擅長用生動比喻講解複雜知識的權威教授。\n任務：請向我解釋[填入名詞/概念]。\n背景：我目前是[填入年級]學生，完全沒有相關背景知識，請使用生活中常見的事物來舉例說明。\n格式：列點說明，並在最後提供一個簡單的自我測驗題確認我是否理解。' },
        { id: 's2', title: '寫作靈感與大綱', content: '角色：你是一位得獎作家與寫作教練。\n任務：請幫我發想作文的切入角度並規劃文章大綱。\n背景：作文題目是[填入題目]，我想表達的核心思想是[填入核心思想]，但我不知道如何開頭與結尾。\n格式：提供3種不同風格的開頭示範，並列出「起、承、轉、合」的段落大綱結構。' },
        { id: 's3', title: '讀書計畫規劃', content: '角色：你是一位高效的時間管理大師與學習輔導員。\n任務：請幫我安排一份針對[填入考試名稱或科目]的讀書計畫。\n背景：距離考試還有[填入週數]週，我每週可念書的時間約為[填入小時數]小時，我最弱的單元是[填入單元]。\n格式：以每週為單位，使用表格呈現學習進度安排與複習節點。' },
        { id: 's4', title: '語言練習對話', content: '角色：你是一位母語為[填入語言]的語言交換夥伴。\n任務：請與我進行一段對話練習。如果我犯了文法或用詞錯誤，請糾正我。\n背景：我們正在討論[填入對話情境，例如：在咖啡廳點餐/討論週末計畫]。\n格式：每次只回覆一句話，用語保持自然口語。請先由你開始第一句話。' },
        { id: 's5', title: '面試/推甄模擬', content: '角色：你是一位嚴格但經驗豐富的[填入校系名稱]大學教授。\n任務：請對我進行入學面試模擬。\n背景：我即將參加該科系的面試，我的個人優勢與背景是[填入1-2個優勢或經歷]。\n格式：一次只問一個問題。等我回答後，給予具體點評、改進建議，然後再問下一個問題。請先拋出第一題。' },
        { id: 's6', title: '專題/科展題目發想', content: '角色：你是一位[填入學科領域]的頂尖創新研究員。\n任務：請幫我發想適合學生的專題研究或科展題目。\n背景：我對[填入興趣關鍵字]有興趣，必須在[填入時間限制]內完成，能使用的資源只有[填入可用資源]。\n格式：提供5個具備可行性與創新性的題目，並分別簡述「研究動機」與建議的「研究方法」。' },
        { id: 's7', title: '長文重點摘要與心智圖', content: '角色：你是一位擅長資訊統整與結構化思考的學霸。\n任務：請將以下長篇文字轉換為重點摘要與心智圖結構。\n背景：這是一篇關於[填入主題]的文本，我需要快速掌握核心概念以利複習。\n格式：先列出3個最核心的重點（Bullet points），接著以層級式條列（Markdown列表形式，方便轉換為心智圖）呈現細節。文本如下：\n[貼上長文]' },
        { id: 's8', title: '錯題盲點分析', content: '角色：你是一位專屬的一對一[填入科目]解題導師。\n任務：請幫我分析這道錯題的思考盲點，而非只是給出解答。\n背景：題目是「[填入題目]」，我原本的答案是[填入錯誤答案]，正確答案是[填入正確答案]。\n格式：指出我可能誤解的核心概念，解釋正確的解題思路，並提供一題類似觀念的題目讓我重新練習。' }
      ]
    };

    let activeRole = 'teacher';
    let activeTemplate = templates.teacher[0];

    const btnTeacher = document.getElementById('btn-teacher');
    const btnStudent = document.getElementById('btn-student');
    const templateList = document.getElementById('template-list');
    const editorTitle = document.getElementById('editor-title');
    const promptTextarea = document.getElementById('prompt-textarea');
    const btnCopy = document.getElementById('btn-copy');
    const iconCopy = document.getElementById('icon-copy');
    const iconCheck = document.getElementById('icon-check');
    const textCopy = document.getElementById('text-copy');

    function renderTemplates() {
      templateList.innerHTML = '';
      templates[activeRole].forEach(template => {
        const btn = document.createElement('button');
        const isActive = activeTemplate.id === template.id;
        
        btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm transition-colors ${
          isActive 
            ? 'bg-white shadow-sm border border-blue-200 text-blue-700 font-medium' 
            : 'hover:bg-gray-200 text-gray-700 border border-transparent'
        }`;
        btn.textContent = template.title;
        btn.onclick = () => {
          activeTemplate = template;
          updateEditor();
          renderTemplates();
        };
        templateList.appendChild(btn);
      });
    }

    function updateEditor() {
      editorTitle.textContent = `編輯提示詞：${activeTemplate.title}`;
      promptTextarea.value = activeTemplate.content;
    }

    function setRole(role) {
      activeRole = role;
      activeTemplate = templates[role][0];
      
      if (role === 'teacher') {
        btnTeacher.className = 'flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-blue-100 text-blue-700 border border-blue-200';
        btnStudent.className = 'flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-100';
      } else {
        btnStudent.className = 'flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-blue-100 text-blue-700 border border-blue-200';
        btnTeacher.className = 'flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-100';
      }
      
      renderTemplates();
      updateEditor();
    }

    btnTeacher.addEventListener('click', () => setRole('teacher'));
    btnStudent.addEventListener('click', () => setRole('student'));

    btnCopy.addEventListener('click', () => {
      const textToCopy = promptTextarea.value;
      
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy);
      } else {
        const textArea = document.createElement('textarea');
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      }

      iconCopy.classList.add('hidden');
      iconCheck.classList.remove('hidden');
      textCopy.textContent = '已複製';

      setTimeout(() => {
        iconCheck.classList.add('hidden');
        iconCopy.classList.remove('hidden');
        textCopy.textContent = '複製提示詞';
      }, 2000);
    });

    // 初始化
    renderTemplates();
    updateEditor();
  </script>
</body>
</html>
