<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育專用 Gemini 提示詞產生器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 font-sans p-4 md:p-6">

  <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 border-b border-gray-200 bg-white gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">教育專用 Gemini 提示詞產生器</h1>
        <p class="text-sm text-gray-500 mt-1">基於 PTCF (Persona, Task, Context, Format) 框架設計</p>
      </div>
      <a href="https://gemini.google.com/" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm whitespace-nowrap">
        開啟 Gemini
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      </a>
    </div>

    <div class="flex flex-col md:flex-row">
      <div class="w-full md:w-1/3 border-r border-gray-200 bg-gray-50/50 flex flex-col h-[300px] md:h-auto">
        <div class="flex p-4 border-b border-gray-200 gap-2 shrink-0 overflow-x-auto no-scrollbar">
          <button id="btn-teacher" class="flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-blue-100 text-blue-700 border border-blue-200 whitespace-nowrap">
            教師情境
          </button>
          <button id="btn-student" class="flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">
            學生情境
          </button>
          <button id="btn-admin" class="flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">
            行政情境
          </button>
        </div>

        <div id="template-list" class="p-4 space-y-2 overflow-y-auto no-scrollbar flex-grow">
        </div>
      </div>

      <div class="w-full md:w-2/3 p-6 flex flex-col bg-white min-h-[500px]">
        <div class="flex justify-between items-center mb-4">
          <h2 id="editor-title" class="text-lg font-bold text-gray-800">編輯提示詞</h2>
          <div class="flex items-center gap-2">
            <input type="checkbox" id="require-checkbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
            <label for="require-checkbox" class="text-sm font-medium text-gray-700 cursor-pointer">加入要求(限制)</label>
          </div>
        </div>
        
        <div class="flex-grow flex flex-col relative">
          <textarea id="prompt-textarea" class="w-full h-full min-h-[350px] p-4 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none text-gray-700 text-sm leading-relaxed" placeholder="在此編輯提示詞..."></textarea>
        </div>
        
        <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <p class="text-xs text-gray-500">請將中括號 <span class="font-mono bg-gray-100 px-1 rounded">[ ]</span> 內的文字替換為實際需求內容</p>
          <button id="btn-copy" class="flex items-center gap-2 px-6 py-2.5 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition-colors font-medium text-sm w-full sm:w-auto justify-center">
            <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            <svg id="icon-check" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            <span id="text-copy">複製提示詞</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const templates = {
      teacher: [
        { id: 't1', title: '教案設計', content: '角色：你是一位擁有[填入年資]年經驗的[填入階段/科目]老師。\n任務：請幫我設計一堂[填入時間長度]的課程教案。\n背景：課程主題是[填入主題]，學生程度約為[填入程度]，希望包含[填入特定教學法或活動]。\n格式：請以表格呈現，包含「時間分配」、「教學內容」、「師生活動」與「評量方式」。', requirement: '[填入特定限制，例如：完全不使用數位載具/需包含小組討論/適合專注力不足的學生]' },
        { id: 't2', title: '考題生成', content: '角色：你是一位嚴謹且熟悉素養導向命題的專家。\n任務：請根據[填入課程單元/主題]，產出[填入題數]道選擇題與[填入題數]道簡答題。\n背景：測驗對象是[填入年級]的學生，題目需測驗學生對[填入核心概念]的理解，而非死記硬背。請包含誘答力強的選項。\n格式：列出題目與選項，並在文件最後提供標準答案與詳解。', requirement: '[填入特定限制，例如：選項字數需相近/不可有「以上皆是」選項/難度設定在中等]' },
        { id: 't3', title: '學生評語撰寫', content: '角色：你是一位具備同理心且善於鼓勵學生的導師。\n任務：請協助我撰寫期末成績單的學生評語。\n背景：該名學生在[填入優點或傑出表現]表現優異，但在[填入需要改進的領域]需要加強。他的個性特質是[填入特質]。\n格式：產生3種不同語氣（鼓勵為主、具體建議為主、期許未來為主）的評語範本，字數約[填入字數]字。', requirement: '[填入特定限制，例如：字數限制在100字以內/語氣必須極度正向/避免使用負面詞彙]' },
        { id: 't4', title: '課堂活動發想', content: '角色：你是一位充滿創意、擅長遊戲化教學的課程設計師。\n任務：請提供[填入數量]個能在課堂上執行的互動活動。\n背景：課程主題是[填入主題]，課堂時間僅剩[填入時間]分鐘，無須準備複雜教具，目標是確認學生是否有吸收剛才講授的內容。\n格式：依序列出活動名稱、執行步驟、所需時間與預期效果。', requirement: '[填入特定限制，例如：學生只能坐在座位上進行/不能發出太大噪音/需以個人為單位進行]' },
        { id: 't5', title: '班級經營策略', content: '角色：你是一位資深輔導老師與班級經營專家。\n任務：請提供班級經營與輔導策略。\n背景：班上有學生[填入具體行為，如：上課經常擾亂秩序/不交作業]，已經影響到[填入影響情況]。\n格式：列出學生行為背後的可能原因，提供3個具體且溫和堅定的應對步驟，以及後續的預防措施。', requirement: '[填入特定限制，例如：不得涉及處罰/需符合正向管教原則/處理過程不超過5分鐘]' },
        { id: 't6', title: '親師溝通草稿', content: '角色：你是一位善於溝通、具備同理心的班導師。\n任務：請幫我撰寫一封給家長的[填入信件類型，如：通知書/關懷信]。\n背景：目的是說明[填入事件或學生狀況]，語氣需要[填入期望語氣，如：溫和堅定/誠懇委婉]。\n格式：專業的電子郵件/書面信件格式，包含主旨、問候語、正文與結語。', requirement: '[填入特定限制，例如：信件長度不超過三段/避免使用過度專業的教育術語/文字需委婉不帶指責]' },
        { id: 't7', title: '引導式學習單設計', content: '角色：你是一位專業的素養導向教材發展專家。\n任務：請協助設計一份[填入科目]科的學習單內容。\n背景：單元是[填入單元名稱]，對象是[填入年級]學生，目標是引導學生思考[填入核心問題或概念]。\n格式：依序列出「引起動機」、「核心問題探究（包含3個層次漸進的問題）」與「進階挑戰」三個區塊的文字內容。', requirement: '[填入特定限制，例如：排版需留有足夠作答空間/問題必須與學生日常生活情境結合]' },
        { id: 't8', title: '教學反思與檢討', content: '角色：你是一位經驗豐富的教學督導與反思教練。\n任務：請引導我進行課後教學反思。\n背景：我剛上完一堂[填入科目/單元]課，我覺得在[填入成功或失敗的具體環節]表現得[填入感受]。\n格式：請提出3個具深度的引導式問題讓我思考，並提供一個未來改進的行動計畫框架。', requirement: '[填入特定限制，例如：條列式呈現/每個改進計畫需包含具體時間表/反思需對焦於學生學習成效]' }
      ],
      student: [
        { id: 's1', title: '複雜概念解釋', content: '角色：你是一位擅長用生動比喻講解複雜知識的權威教授。\n任務：請向我解釋[填入名詞/概念]。\n背景：我目前是[填入年級]學生，完全沒有相關背景知識，請使用生活中常見的事物來舉例說明。\n格式：列點說明，並在最後提供一個簡單的自我測驗題確認我是否理解。', requirement: '[填入特定限制，例如：完全不使用專有名詞/類比必須跟「食物」有關/字數不超過300字]' },
        { id: 's2', title: '寫作靈感與大綱', content: '角色：你是一位得獎作家與寫作教練。\n任務：請幫我發想作文的切入角度並規劃文章大綱。\n背景：作文題目是[填入題目]，我想表達的核心思想是[填入核心思想]，但我不知道如何開頭與結尾。\n格式：提供3種不同風格的開頭示範，並列出「起、承、轉、合」的段落大綱結構。', requirement: '[填入特定限制，例如：必須包含一個名人名言/開頭必須是問句/段落安排需符合論說文結構]' },
        { id: 's3', title: '讀書計畫規劃', content: '角色：你是一位高效的時間管理大師與學習輔導員。\n任務：請幫我安排一份針對[填入考試名稱或科目]的讀書計畫。\n背景：距離考試還有[填入週數]週，我每週可念書的時間約為[填入小時數]小時，我最弱的單元是[填入單元]。\n格式：以每週為單位，使用表格呈現學習進度安排與複習節點。', requirement: '[填入特定限制，例如：週末必須安排休息時間/每天需包含30分鐘的運動時間/最弱單元需安排雙倍時間]' },
        { id: 's4', title: '語言練習對話', content: '角色：你是一位母語為[填入語言]的語言交換夥伴。\n任務：請與我進行一段對話練習。如果我犯了文法或用詞錯誤，請糾正我。\n背景：我們正在討論[填入對話情境，例如：在咖啡廳點餐/討論週末計畫]。\n格式：每次只回覆一句話，用語保持自然口語。請先由你開始第一句話。', requirement: '[填入特定限制，例如：糾正我時必須解釋文法規則/請使用B1級別的單字/嚴格限制每句不超過15個字]' },
        { id: 's5', title: '面試/推甄模擬', content: '角色：你是一位嚴格但經驗豐富的[填入校系名稱]大學教授。\n任務：請對我進行入學面試模擬。\n背景：我即將參加該科系的面試，我的個人優勢與背景是[填入1-2個優勢或經歷]。\n格式：一次只問一個問題。等我回答後，給予具體點評、改進建議，然後再問下一個問題。請先拋出第一題。', requirement: '[填入特定限制，例如：教授的語氣設定為嚴厲/每次點評需指出一個致命缺點/針對我的背景提出質疑]' },
        { id: 's6', title: '專題/科展題目發想', content: '角色：你是一位[填入學科領域]的頂尖創新研究員。\n任務：請幫我發想適合學生的專題研究或科展題目。\n背景：我對[填入興趣關鍵字]有興趣，必須在[填入時間限制]內完成，能使用的資源只有[填入可用資源]。\n格式：提供5個具備可行性與創新性的題目，並分別簡述「研究動機」與建議的「研究方法」。', requirement: '[填入特定限制，例如：研究材料總花費不能超過500元/必須能在室內完成/不涉及危險化學物質]' },
        { id: 's7', title: '長文重點摘要與心智圖', content: '角色：你是一位擅長資訊統整與結構化思考的學霸。\n任務：請將以下長篇文字轉換為重點摘要與心智圖結構。\n背景：這是一篇關於[填入主題]的文本，我需要快速掌握核心概念以利複習。\n格式：先列出3個最核心的重點（Bullet points），接著以層級式條列（Markdown列表形式，方便轉換為心智圖）呈現細節。文本如下：\n[貼上長文]', requirement: '[填入特定限制，例如：心智圖層次不超過三層/每個重點只能用一句話概括/必須標示出專有名詞]' },
        { id: 's8', title: '錯題盲點分析', content: '角色：你是一位專屬的一對一[填入科目]解題導師。\n任務：請幫我分析這道錯題的思考盲點，而非只是給出解答。\n背景：題目是「[填入題目]」，我原本的答案是[填入錯誤答案]，正確答案是[填入正確答案]。\n格式：指出我可能誤解的核心概念，解釋正確的解題思路，並提供一題類似觀念的題目讓我重新練習。', requirement: '[填入特定限制，例如：不要直接給我解答/請用蘇格拉底提問法引導我/分析步驟不超過三步]' }
      ],
      admin: [
        { id: 'a1', title: '校園公告撰寫', content: '角色：你是一位嚴謹且細心的學校行政人員。\n任務：請幫我撰寫一份給全校師生的[填入公告事項，例如：防震演練/防疫措施]公告。\n背景：活動將於[填入時間]在[填入地點]舉行，注意事項包含[填入注意事項]。\n格式：正式的公文/公告格式，包含主旨、說明、執行時間與注意事項。', requirement: '[填入特定限制，例如：語氣需緊急且嚴肅/字數不超過200字/關鍵資訊需標粗體]' },
        { id: 'a2', title: '活動企劃草案', content: '角色：你是一位擅長資源整合與活動規劃的校園活動總召。\n任務：請協助規劃[填入活動名稱，例如：校慶/親職講座]的活動企劃案。\n背景：預計參與人數約為[填入人數]人，活動總預算為[填入金額]，主要目標是[填入活動目標]。\n格式：請以表格呈現，包含「活動流程」、「時程安排」、「負責單位」與「經費預估」。', requirement: '[填入特定限制，例如：必須包含雨天備案/預算分配需有5%的預備金/人力配置需註明志工需求]' },
        { id: 'a3', title: '家長投訴信回覆', content: '角色：你是一位具備高度情商與公關技巧的學校主管。\n任務：請幫我擬定一封回覆家長投訴的信件。\n背景：家長對於[填入投訴事由，例如：學生午餐品質/校車誤點]感到不滿。校方目前的處置是[填入校方處置]，希望能平息家長怒氣並展現解決誠意。\n格式：語氣委婉、具同理心且展現專業，包含感謝反映、說明情況、解決方案與後續聯絡方式。', requirement: '[填入特定限制，例如：絕對不承諾金錢賠償/不推卸責任給單一教職員/必須承諾三天內再次回報進度]' },
        { id: 'a4', title: '會議紀錄重點摘要', content: '角色：你是一位邏輯清晰的行政助理。\n任務：請將以下的[填入會議名稱，例如：校務會議/處室主管會議]逐字稿或重點筆記轉換為正式會議紀錄。\n背景：本次會議的重點聚焦在[填入會議核心議題]，需要明確列出後續待辦事項。\n格式：包含「會議主題」、「決議事項」與「後續追蹤與負責人（Bullet points）」。文本如下：\n[貼上筆記或逐字稿]', requirement: '[填入特定限制，例如：過濾掉情緒性發言與閒聊/所有決議事項需加上粗體/字數精簡至500字內]' },
        { id: 'a5', title: '校園新聞稿撰寫', content: '角色：你是一位熟悉媒體生態的學校公關專員。\n任務：請為本校的[填入傑出事蹟或活動，例如：學生榮獲科展金牌/特色校園啟用]撰寫一篇新聞稿。\n背景：亮點是[填入亮點]，希望傳達本校[填入辦學理念或特色]的正面形象。\n格式：新聞稿標準格式，包含吸睛的標題、導言（5W1H）、主體段落與結語，字數約[填入字數]字。', requirement: '[填入特定限制，例如：第一段必須點出學校全名/需包含一句校長的引言/避免使用生僻字詞]' },
        { id: 'a6', title: '採購需求說明書', content: '角色：你是一位熟悉政府採購與學校設備需求承辦人員。\n任務：請協助撰寫[填入採購項目，例如：數位教學設備/圖書館自動化系統]的採購需求說明。\n背景：預算是[填入預算]，該設備必須具備[填入必要規格或功能]，以滿足[填入使用情境]的需求。\n格式：條列式呈現規格需求、保固條件、交貨期限與驗收標準。', requirement: '[填入特定限制，例如：必須符合綠色採購規範/禁用特定國家製造之資訊產品/保固期要求至少三年]' },
        { id: 'a7', title: '志工招募文案', content: '角色：你是一位熱情且具說服力的活動策劃員。\n任務：請撰寫一篇用於[填入發布管道，如：學校官網/家長群組]的[填入活動，如：交通導護/圖書管理]志工招募文案。\n背景：我們需要[填入人數]名志工，排班時間為[填入時間]，希望吸引有熱忱的家長或社區民眾參與。\n格式：活潑且具號召力的語氣，包含招募動機、工作內容、報名方式與截止日期。', requirement: '[填入特定限制，例如：排版需使用大量適當的Emoji/報名連結必須放在第一段/強調志工福利與服務時數證明]' },
        { id: 'a8', title: '跨處室溝通備忘錄', content: '角色：你是一位善於協調與橫向溝通的行政主管。\n任務：請擬定一份發給[填入接收處室，如：教務處/總務處]的內部溝通備忘錄（Memo）。\n背景：為順利推動[填入專案/活動名稱]，我們需要該處室協助[填入具體協助事項]，期限是[填入日期]。\n格式：清晰簡明，包含主旨、協辦事項說明、時程要求與聯絡窗口。', requirement: '[填入特定限制，例如：語氣必須極度客氣且互相尊重/必須將校長室列入副本/明確列出最後確認節點]' }
      ]
    };

    let activeRole = 'teacher';
    let activeTemplate = templates.teacher[0];

    const btnTeacher = document.getElementById('btn-teacher');
    const btnStudent = document.getElementById('btn-student');
    const btnAdmin = document.getElementById('btn-admin');
    const templateList = document.getElementById('template-list');
    const editorTitle = document.getElementById('editor-title');
    const promptTextarea = document.getElementById('prompt-textarea');
    const btnCopy = document.getElementById('btn-copy');
    const iconCopy = document.getElementById('icon-copy');
    const iconCheck = document.getElementById('icon-check');
    const textCopy = document.getElementById('text-copy');
    const requireCheckbox = document.getElementById('require-checkbox');

    function renderTemplates() {
      templateList.innerHTML = '';
      templates[activeRole].forEach(template => {
        const btn = document.createElement('button');
        const isActive = activeTemplate.id === template.id;
        
        btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm transition-colors ${
          isActive 
            ? 'bg-white shadow-sm border border-blue-200 text-blue-700 font-medium' 
            : 'hover:bg-gray-200 text-gray-700 border border-transparent'
        }`;
        btn.textContent = template.title;
        btn.onclick = () => {
          activeTemplate = template;
          requireCheckbox.checked = false;
          updateEditor();
          renderTemplates();
        };
        templateList.appendChild(btn);
      });
    }

    function updateEditor() {
      editorTitle.textContent = `編輯提示詞：${activeTemplate.title}`;
      let text = activeTemplate.content;
      if (requireCheckbox.checked && activeTemplate.requirement) {
        text += `\n要求：${activeTemplate.requirement}`;
      }
      promptTextarea.value = text;
    }

    requireCheckbox.addEventListener('change', updateEditor);

    function setRole(role) {
      activeRole = role;
      activeTemplate = templates[role][0];
      requireCheckbox.checked = false;
      
      const activeClass = 'flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-blue-100 text-blue-700 border border-blue-200 whitespace-nowrap';
      const inactiveClass = 'flex-1 py-2 px-4 rounded-md font-medium text-sm transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap';
      
      btnTeacher.className = role === 'teacher' ? activeClass : inactiveClass;
      btnStudent.className = role === 'student' ? activeClass : inactiveClass;
      btnAdmin.className = role === 'admin' ? activeClass : inactiveClass;
      
      renderTemplates();
      updateEditor();
    }

    btnTeacher.addEventListener('click', () => setRole('teacher'));
    btnStudent.addEventListener('click', () => setRole('student'));
    btnAdmin.addEventListener('click', () => setRole('admin'));

    btnCopy.addEventListener('click', () => {
      const textToCopy = promptTextarea.value;
      
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy);
      } else {
        const textArea = document.createElement('textarea');
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      }

      iconCopy.classList.add('hidden');
      iconCheck.classList.remove('hidden');
      textCopy.textContent = '已複製';

      setTimeout(() => {
        iconCheck.classList.add('hidden');
        iconCopy.classList.remove('hidden');
        textCopy.textContent = '複製提示詞';
      }, 2000);
    });

    renderTemplates();
    updateEditor();
  </script>
</body>
</html>
