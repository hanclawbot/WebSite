<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 影片迴旋鏢製作工具</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════  全域 Kawaii 基底  ═══════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e0f7fa 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 40px;
  color: #4a4a6a;
}

/* ─── 標題 ─── */
.app-header {
  text-align: center; margin-bottom: 28px;
}
.app-header h1 {
  font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e91e63, #9c27b0, #3f51b5);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.app-header p {
  font-size: 0.92rem; color: #888; margin-top: 6px; font-weight: 600;
}

/* ─── 共用卡片 ─── */
.card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(180,140,200,0.18);
  padding: 28px;
  width: 100%; max-width: 780px;
}

/* ─── 拖放區 ─── */
#dropZone {
  border: 3px dashed #ce93d8;
  border-radius: 20px;
  padding: 52px 32px;
  text-align: center;
  cursor: pointer;
  transition: all .25s ease;
  background: rgba(243,229,245,0.35);
  position: relative;
}
#dropZone:hover, #dropZone.drag-over {
  border-color: #e91e63;
  background: rgba(252,228,236,0.6);
  transform: scale(1.01);
}
#dropZone .drop-icon { font-size: 3.5rem; margin-bottom: 12px; display: block; }
#dropZone h2 { font-size: 1.2rem; font-weight: 800; color: #9c27b0; }
#dropZone p  { font-size: 0.85rem; color: #aaa; margin-top: 6px; }
#dropZone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}

/* ─── 影片預覽 ─── */
#videoPreviewWrap {
  display: none; margin-top: 20px; border-radius: 16px;
  overflow: hidden; background: #111; text-align: center;
}
#videoPreview { max-width: 100%; max-height: 300px; display: block; margin: auto; }

/* ─── 設定列 ─── */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin-top: 20px;
}
@media (max-width: 540px) { .settings-grid { grid-template-columns: 1fr 1fr; } }

.setting-item label {
  display: block; font-size: 0.78rem; font-weight: 700;
  color: #9c27b0; margin-bottom: 5px; text-transform: uppercase;
  letter-spacing: 0.5px;
}
.setting-item select,
.setting-item input[type=range] {
  width: 100%; border-radius: 12px; border: 2px solid #e1bee7;
  padding: 8px 12px; font-family: inherit; font-size: 0.88rem;
  color: #4a4a6a; background: #fdf6ff; outline: none;
  cursor: pointer;
}
.setting-item select:focus { border-color: #e91e63; }

.range-label {
  display: flex; justify-content: space-between;
  font-size: 0.75rem; color: #999; margin-top: 3px;
}

/* ─── 按鈕 ─── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border-radius: 50px; border: none;
  font-family: inherit; font-size: 1rem; font-weight: 800;
  cursor: pointer; transition: all .2s ease;
  text-decoration: none;
}
.btn-primary {
  background: linear-gradient(135deg, #e91e63, #9c27b0);
  color: white; box-shadow: 0 4px 18px rgba(233,30,99,0.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(233,30,99,0.45); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.btn-secondary {
  background: #f3e5f5; color: #9c27b0; border: 2px solid #e1bee7;
}
.btn-secondary:hover { background: #e1bee7; }

.btn-download {
  background: linear-gradient(135deg, #4caf50, #2196f3);
  color: white; box-shadow: 0 4px 18px rgba(76,175,80,0.35);
}
.btn-download:hover { transform: translateY(-2px); }

.actions { margin-top: 22px; display: flex; gap: 12px; flex-wrap: wrap; }

/* ─── 進度條 ─── */
#progressSection { display: none; }

.progress-wrap {
  background: #f3e5f5; border-radius: 20px;
  height: 22px; overflow: hidden; margin-top: 14px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.07);
}
.progress-bar {
  height: 100%; border-radius: 20px;
  background: linear-gradient(90deg, #e91e63, #9c27b0, #3f51b5);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite linear;
  transition: width .3s ease;
  width: 0%;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.status-msg {
  font-size: 0.88rem; color: #9c27b0; font-weight: 600;
  margin-top: 10px; min-height: 20px;
}

.phase-title {
  font-size: 1.15rem; font-weight: 800; color: #7b1fa2;
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}

/* ─── 結果區 ─── */
#resultSection { display: none; margin-top: 24px; }

#canvasWrap {
  border-radius: 16px; overflow: hidden;
  background: #111; text-align: center;
}
#outputCanvas {
  max-width: 100%; display: block; margin: auto;
  max-height: 380px;
}

.result-meta {
  display: flex; gap: 18px; flex-wrap: wrap;
  margin-top: 14px;
}
.meta-chip {
  background: linear-gradient(135deg, #f3e5f5, #e8eaf6);
  border-radius: 50px; padding: 6px 16px;
  font-size: 0.82rem; font-weight: 700; color: #7b1fa2;
  display: flex; align-items: center; gap: 6px;
}

/* ─── 模式說明 ─── */
.mode-desc {
  background: linear-gradient(135deg, #fce4ec, #f3e5f5);
  border-radius: 14px; padding: 14px 18px;
  font-size: 0.83rem; color: #9c27b0; font-weight: 600;
  margin-top: 16px; line-height: 1.65;
}
.mode-desc span { display: block; margin-bottom: 3px; }

/* ─── 警告 ─── */
.warn-box {
  background: #fff3e0; border-left: 4px solid #ff9800;
  border-radius: 12px; padding: 12px 16px;
  font-size: 0.83rem; color: #e65100; font-weight: 600;
  margin-top: 12px; display: none;
}

</style>
</head>
<body>

<header class="app-header">
  <h1>🎬 影片迴旋鏢製作工具</h1>
  <p>正放 + 倒放 — 讓 AI 生成的短片頭尾順暢無縫循環</p>
</header>

<div class="card" id="mainCard">

  <!-- ══ Phase 1：上傳 ══ -->
  <div id="uploadSection">
    <div id="dropZone">
      <span class="drop-icon">🎞️</span>
      <h2>拖放影片到這裡</h2>
      <p>或點擊選擇影片（MP4、MOV、WebM 等）</p>
      <input type="file" id="fileInput" accept="video/*">
    </div>

    <div id="videoPreviewWrap">
      <video id="videoPreview" controls muted></video>
    </div>

    <div id="warnBox" class="warn-box">
      ⚠️  影片超過 20 秒，瀏覽器版本建議處理 20 秒以內的短片，以避免記憶體不足。<br>
      如需處理較長影片，請改用 <strong>video_boomerang.py</strong> Python 腳本。
    </div>

    <!-- 設定 -->
    <div class="settings-grid" id="settingsGrid" style="display:none">
      <div class="setting-item">
        <label>迴旋模式</label>
        <select id="modeSelect">
          <option value="bounce">🔄 Bounce（正放+倒放）</option>
          <option value="loop">🔁 Loop（正放+倒放+正放）</option>
          <option value="reverse">⏪ Reverse（純倒放）</option>
        </select>
      </div>
      <div class="setting-item">
        <label>重複次數</label>
        <select id="timesSelect">
          <option value="1">1 次</option>
          <option value="2">2 次</option>
          <option value="3">3 次</option>
          <option value="4">4 次</option>
        </select>
      </div>
      <div class="setting-item">
        <label>擷取 FPS</label>
        <select id="fpsSelect">
          <option value="24">24 fps</option>
          <option value="30" selected>30 fps</option>
          <option value="15">15 fps（較快）</option>
        </select>
      </div>
    </div>

    <div class="mode-desc" id="modeDesc" style="display:none">
      <span>🔄 <strong>Bounce</strong>：正放→倒放，首尾幀相同，最適合無縫循環。</span>
      <span>🔁 <strong>Loop</strong>：正放→倒放→正放，比 Bounce 多一段正放，循環更自然。</span>
      <span>⏪ <strong>Reverse</strong>：只產出倒放版，用於製作備用素材。</span>
    </div>

    <div class="actions" id="startActions" style="display:none">
      <button class="btn btn-primary" id="startBtn" onclick="startProcess()">
        ✨ 開始製作迴旋鏢
      </button>
    </div>
  </div>

  <!-- ══ Phase 2：處理進度 ══ -->
  <div id="progressSection">
    <div class="phase-title">⚙️ 處理中...</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status-msg" id="statusMsg">初始化...</div>
  </div>

  <!-- ══ Phase 3：結果 ══ -->
  <div id="resultSection">
    <div class="phase-title">🎉 製作完成！</div>

    <div id="canvasWrap">
      <canvas id="outputCanvas"></canvas>
    </div>

    <div class="result-meta" id="resultMeta"></div>

    <div class="actions">
      <button class="btn btn-download" id="downloadBtn" onclick="downloadResult()">
        ⬇️ 下載 WebM 影片
      </button>
      <button class="btn btn-secondary" onclick="resetAll()">
        🔄 重新開始
      </button>
    </div>
  </div>

</div><!-- /card -->

<script>
/* ════════════════════════════════════════════════════════════
   狀態
   ════════════════════════════════════════════════════════════ */
let originalFile    = null;
let allFrames       = [];   // ImageData[]（正向）
let resultBlob      = null;
let previewInterval = null;

const $ = id => document.getElementById(id);

/* ════════════════════════════════════════════════════════════
   Phase 1 — 上傳
   ════════════════════════════════════════════════════════════ */

const dropZone  = $('dropZone');
const fileInput = $('fileInput');

dropZone.addEventListener('dragover', e => {
  e.preventDefault(); dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadVideo(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadVideo(fileInput.files[0]);
});

function loadVideo(file) {
  originalFile = file;
  const url = URL.createObjectURL(file);
  const vid  = $('videoPreview');
  vid.src    = url;
  vid.onloadedmetadata = () => {
    $('videoPreviewWrap').style.display = 'block';
    $('settingsGrid').style.display     = 'grid';
    $('modeDesc').style.display         = 'block';
    $('startActions').style.display     = 'flex';
    // 警告超長影片
    $('warnBox').style.display = vid.duration > 20 ? 'block' : 'none';
  };
}

/* ════════════════════════════════════════════════════════════
   Phase 2 — 擷取影格
   ════════════════════════════════════════════════════════════ */

function setProgress(pct, msg) {
  $('progressBar').style.width = pct + '%';
  $('statusMsg').textContent   = msg;
}

async function startProcess() {
  const vid   = $('videoPreview');
  const fps   = parseInt($('fpsSelect').value);
  const mode  = $('modeSelect').value;
  const times = parseInt($('timesSelect').value);

  // 切換到進度頁
  $('uploadSection').style.display  = 'none';
  $('progressSection').style.display = 'block';
  setProgress(0, '準備中...');

  // ── 擷取所有影格 ─────────────────────────────────────────
  allFrames = [];
  const duration    = vid.duration;
  const frameCount  = Math.floor(duration * fps);
  const step        = 1 / fps;

  // 建立離屏 canvas（最大寬 960px）
  const canvas = document.createElement('canvas');
  const scale  = Math.min(1, 960 / vid.videoWidth);
  canvas.width  = Math.round(vid.videoWidth  * scale);
  canvas.height = Math.round(vid.videoHeight * scale);
  const ctx = canvas.getContext('2d');

  vid.pause();
  vid.muted = true;

  setProgress(2, `擷取影格（共 ${frameCount} 幀，解析度 ${canvas.width}×${canvas.height}）...`);

  // 逐幀 seek + 擷取
  for (let i = 0; i < frameCount; i++) {
    const t = i * step;
    await seekTo(vid, t);
    ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
    allFrames.push(ctx.getImageData(0, 0, canvas.width, canvas.height));

    if (i % 5 === 0) {
      const pct = Math.round((i / frameCount) * 45);
      setProgress(pct, `擷取影格 ${i + 1} / ${frameCount}...`);
      await sleep(0);  // 釋放 UI 執行緒
    }
  }

  setProgress(48, `已擷取 ${allFrames.length} 幀，開始組合迴旋序列...`);
  await sleep(10);

  // ── 組合序列 ─────────────────────────────────────────────
  const fwd = allFrames;
  const rev = [...allFrames].reverse();

  let sequence = [];
  if (mode === 'bounce') {
    for (let n = 0; n < times; n++) sequence.push(...fwd, ...rev);
  } else if (mode === 'loop') {
    for (let n = 0; n < times; n++) sequence.push(...fwd, ...rev);
    sequence.push(...fwd);
  } else if (mode === 'reverse') {
    for (let n = 0; n < times; n++) sequence.push(...rev);
  }

  setProgress(52, `序列共 ${sequence.length} 幀（${(sequence.length / fps).toFixed(2)}s），開始錄製...`);
  await sleep(20);

  // ── 用 MediaRecorder 錄製 canvas ────────────────────────
  const outCanvas  = $('outputCanvas');
  outCanvas.width  = canvas.width;
  outCanvas.height = canvas.height;
  const outCtx = outCanvas.getContext('2d');

  // 選擇 mimeType
  const mimeType = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
    .find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

  const stream   = outCanvas.captureStream(fps);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks   = [];

  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  const recordingDone = new Promise(resolve => {
    recorder.onstop = () => {
      resultBlob = new Blob(chunks, { type: mimeType });
      resolve();
    };
  });

  recorder.start();

  // 逐幀播放到 canvas，讓 MediaRecorder 捕捉
  const frameDelay = 1000 / fps;
  for (let i = 0; i < sequence.length; i++) {
    outCtx.putImageData(sequence[i], 0, 0);
    if (i % 10 === 0) {
      const pct = 52 + Math.round((i / sequence.length) * 44);
      setProgress(pct, `錄製中：${i + 1} / ${sequence.length} 幀...`);
      await sleep(0);
    }
    await sleep(frameDelay);
  }

  recorder.stop();
  await recordingDone;

  setProgress(100, '完成！');
  await sleep(300);

  // ── 顯示結果 ─────────────────────────────────────────────
  $('progressSection').style.display = 'none';
  $('resultSection').style.display   = 'block';

  // 結果 metadata
  const origDur = duration.toFixed(2);
  const newDur  = (sequence.length / fps).toFixed(2);
  const sizeMB  = (resultBlob.size / 1024 / 1024).toFixed(1);
  $('resultMeta').innerHTML = `
    <div class="meta-chip">🎞️ 原始：${origDur}s</div>
    <div class="meta-chip">🎬 輸出：${newDur}s</div>
    <div class="meta-chip">📦 大小：${sizeMB} MB</div>
    <div class="meta-chip">🖼 解析度：${canvas.width}×${canvas.height}</div>
    <div class="meta-chip">📋 模式：${mode}×${times}</div>
  `;

  // 預覽迴旋播放
  startPreview(sequence, outCtx, outCanvas.width, outCanvas.height, fps);
}

/* ════════════════════════════════════════════════════════════
   預覽播放
   ════════════════════════════════════════════════════════════ */
function startPreview(sequence, ctx, w, h, fps) {
  if (previewInterval) clearInterval(previewInterval);
  let idx = 0;
  previewInterval = setInterval(() => {
    ctx.putImageData(sequence[idx], 0, 0);
    idx = (idx + 1) % sequence.length;
  }, 1000 / fps);
}

/* ════════════════════════════════════════════════════════════
   下載
   ════════════════════════════════════════════════════════════ */
function downloadResult() {
  if (!resultBlob) return;
  const a    = document.createElement('a');
  const ext  = resultBlob.type.includes('webm') ? 'webm' : 'webm';
  const name = (originalFile?.name.replace(/\.[^.]+$/, '') || 'video') + '_boomerang.' + ext;
  a.href     = URL.createObjectURL(resultBlob);
  a.download = name;
  a.click();
}

/* ════════════════════════════════════════════════════════════
   重置
   ════════════════════════════════════════════════════════════ */
function resetAll() {
  if (previewInterval) clearInterval(previewInterval);
  allFrames  = [];
  resultBlob = null;
  $('progressSection').style.display = 'none';
  $('resultSection').style.display   = 'none';
  $('uploadSection').style.display   = 'block';
  $('videoPreviewWrap').style.display = 'none';
  $('settingsGrid').style.display    = 'none';
  $('modeDesc').style.display        = 'none';
  $('startActions').style.display    = 'none';
  $('warnBox').style.display         = 'none';
  $('videoPreview').src = '';
  fileInput.value = '';
}

/* ════════════════════════════════════════════════════════════
   工具函式
   ════════════════════════════════════════════════════════════ */
function seekTo(video, time) {
  return new Promise(resolve => {
    const onSeeked = () => { video.removeEventListener('seeked', onSeeked); resolve(); };
    video.addEventListener('seeked', onSeeked);
    video.currentTime = time;
  });
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>

</body>
</html>
