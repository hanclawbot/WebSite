<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FFF0F5;
    --mint:#F0FFF4;
    --cream:#FFFDE7;
    --sky:#E3F2FD;
    --text:#5D4037;
    --accent:#FF8FAB;
    --accent2:#FFB74D;
    --border:#FADADD;
    --green:#A5D6A7;
    --blue:#90CAF9;
    --purple:#CE93D8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0;
    font-family:'Nunito','M PLUS Rounded 1c',sans-serif;
    color:var(--text);
    line-height:1.7;
    background:
      radial-gradient(circle at 10% 10%, rgba(255,182,193,0.25) 0, transparent 35%),
      radial-gradient(circle at 90% 20%, rgba(165,214,167,0.25) 0, transparent 35%),
      radial-gradient(circle at 50% 90%, rgba(144,202,249,0.25) 0, transparent 40%),
      #FFF8FA;
    padding-bottom:90px;
  }
  /* ===== Header ===== */
  header{
    position:sticky; top:0; z-index:50;
    background:linear-gradient(135deg,#FFB6C1,#FF8FAB 60%,#FFB74D);
    color:#fff;
    padding:14px 16px 10px;
    box-shadow:0 4px 14px rgba(255,143,171,0.35);
    border-radius:0 0 24px 24px;
  }
  header h1{
    margin:0; font-size:1.25rem; font-weight:800;
    text-align:center; letter-spacing:1px;
    text-shadow:0 2px 4px rgba(0,0,0,0.08);
  }
  header .sub{
    text-align:center; font-size:0.8rem; margin-top:4px; opacity:0.95;
  }
  /* ===== Tabs ===== */
  .tabs{
    display:flex; gap:8px; overflow-x:auto;
    padding:12px 12px 6px; margin-top:10px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex:0 0 auto;
    background:rgba(255,255,255,0.25);
    border:2px solid rgba(255,255,255,0.6);
    color:#fff; font-weight:700;
    border-radius:50px;
    padding:8px 16px;
    font-size:0.85rem;
    font-family:inherit;
    cursor:pointer;
    transition:all .2s;
    white-space:nowrap;
  }
  .tab-btn.active{
    background:#fff; color:var(--accent);
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transform:scale(1.05);
  }
  /* ===== Main ===== */
  main{ padding:16px 12px 12px; max-width:720px; margin:0 auto; }
  .page{ display:none; animation:fadeIn .35s ease; }
  .page.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .day-title-card{
    background:linear-gradient(135deg,#FFFDE7,#FFE9EC);
    border:3px solid var(--border);
    border-radius:24px;
    padding:18px 20px;
    margin-bottom:16px;
    box-shadow:0 8px 16px rgba(255,182,193,0.35);
    text-align:center;
  }
  .day-title-card .badge{
    display:inline-block; background:var(--accent); color:#fff;
    border-radius:50px; padding:4px 16px; font-weight:800; font-size:0.85rem;
    margin-bottom:8px;
  }
  .day-title-card h2{ margin:4px 0; font-size:1.3rem; }
  .day-title-card .date{ font-size:0.9rem; color:#8d6e63; font-weight:700; }

  /* Section card */
  .card{
    background:#fff;
    border:3px solid var(--border);
    border-radius:22px;
    box-shadow:0 6px 14px rgba(255,182,193,0.25);
    padding:16px 18px;
    margin-bottom:14px;
  }
  .card h3{
    margin:0 0 10px; font-size:1.05rem;
    display:flex; align-items:center; gap:8px;
    color:#E64A6E;
  }
  .card h3 .icon{ font-size:1.3rem; }
  .card ul{ margin:6px 0; padding-left:1.3em; }
  .card li{ margin-bottom:6px; }
  .card p{ margin:6px 0; }

  /* Timeline */
  .timeline{ position:relative; padding-left:28px; }
  .timeline::before{
    content:''; position:absolute; left:9px; top:6px; bottom:6px;
    width:3px; background:repeating-linear-gradient(180deg, var(--accent) 0 8px, transparent 8px 14px);
    border-radius:3px;
  }
  .t-item{ position:relative; margin-bottom:18px; }
  .t-item:last-child{ margin-bottom:0; }
  .t-item::before{
    content:''; position:absolute; left:-28px; top:4px;
    width:18px; height:18px; border-radius:50%;
    background:#fff; border:3px solid var(--accent);
  }
  .t-time{
    display:inline-block; background:var(--accent2); color:#fff;
    font-weight:800; font-size:0.78rem; border-radius:50px;
    padding:2px 12px; margin-bottom:5px;
  }
  .t-title{ font-weight:800; font-size:1rem; margin:2px 0 4px; color:#4A4A4A; }
  .t-title .e{ margin-right:4px; }
  .t-desc{ font-size:0.92rem; color:#6d4c41; }
  .t-desc b{ color:#E64A6E; }

  /* tag chips */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .chip{
    background:var(--mint); border:2px solid var(--green);
    border-radius:50px; padding:4px 12px; font-size:0.78rem; font-weight:700;
  }
  .chip.blue{ background:var(--sky); border-color:var(--blue); }
  .chip.purple{ background:#F3E5F5; border-color:var(--purple); }
  .chip.orange{ background:#FFF3E0; border-color:var(--accent2); }

  /* Tip box */
  .tip-box{
    background:var(--cream);
    border:2px dashed var(--accent2);
    border-radius:18px;
    padding:12px 14px;
    margin-top:10px;
    font-size:0.9rem;
  }
  .tip-box b{ color:#EF6C00; }

  /* Accordion */
  .acc{
    background:#fff; border:3px solid var(--border); border-radius:22px;
    margin-bottom:14px; overflow:hidden;
    box-shadow:0 6px 14px rgba(255,182,193,0.25);
  }
  .acc-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px; cursor:pointer; font-weight:800; font-size:1rem;
    background:linear-gradient(135deg,#FFF0F5,#FFFDE7);
    color:#E64A6E;
  }
  .acc-head .arrow{ transition:transform .25s; font-size:1rem; }
  .acc.open .acc-head .arrow{ transform:rotate(180deg); }
  .acc-body{
    max-height:0; overflow:hidden; transition:max-height .3s ease;
    padding:0 18px;
  }
  .acc.open .acc-body{ padding:8px 18px 16px; }
  .acc-body h4{ margin:10px 0 4px; font-size:0.92rem; color:#EF6C00; }
  .acc-body ul{ margin:4px 0; padding-left:1.2em; font-size:0.9rem; }
  .acc-body li{ margin-bottom:5px; }
  .acc-body p{ font-size:0.9rem; margin:4px 0; }

  /* prep page icons */
  .prep-card h3{ color:#388E3C; }
  .prep-card.warn h3{ color:#E65100; }

  /* nav arrows footer */
  .day-nav{
    display:flex; justify-content:space-between; gap:10px; margin-top:6px;
  }
  .day-nav button{
    flex:1; padding:12px; border-radius:50px; border:none;
    background:var(--accent); color:#fff; font-weight:800;
    font-family:inherit; font-size:0.9rem; cursor:pointer;
    box-shadow:0 4px 12px rgba(255,143,171,0.4);
    transition:transform .15s;
  }
  .day-nav button:disabled{ opacity:0.35; }
  .day-nav button:active{ transform:scale(0.96); }

  /* search */
  .search-wrap{ padding:0 12px 0; max-width:720px; margin:0 auto; }
  .search-wrap input{
    width:100%; padding:10px 16px; border-radius:50px;
    border:2px solid var(--border); font-family:inherit; font-size:0.9rem;
    margin-top:10px; background:#fff; color:var(--text);
  }
  .search-wrap input:focus{ outline:2px solid var(--accent); }

  footer{
    text-align:center; font-size:0.78rem; color:#a1887f; padding:18px;
  }

  /* hotel/list cards in extra page */
  .hotel-card{
    background:#fff; border:2px solid var(--border); border-radius:18px;
    padding:12px 16px; margin-bottom:10px; font-size:0.9rem;
  }
  .hotel-card .name{ font-weight:800; color:#E64A6E; margin-bottom:2px; }
  .hotel-card .price{ display:inline-block; background:var(--accent2); color:#fff; border-radius:50px; padding:1px 10px; font-size:0.75rem; font-weight:700; margin-left:6px; }

  ::-webkit-scrollbar{ width:6px; height:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:10px; }
</style>
</head>

    "專家小撇步：想拍清晰山笠照片，建議提早30分鐘到承天寺門口，那是山笠轉彎處，速度感與張力最強，且人潮較少。"
  ]
},
{
  day:9, date:"7/11（六）", title:"歸途：最後採買",
  timeline:[
    {time:"上午", e:"🚇", title:"交通移動", desc:"博多站 ➔ 地鐵機場線（5分鐘）➔ 接駁車至國際航廈。"},
    {time:"機場", e:"🛍️", title:"最後採買", desc:"福砂屋長崎蛋糕、博多通饅頭（機場免稅店最後補貨）。"}
  ],
  food:[],
  shopping:["福砂屋長崎蛋糕","博多通饅頭"],
  tips:["7月正值暑假旅遊旺季，福岡機場國際線出境人潮與安檢排隊非常誇張，強烈建議提早2.5至3小時抵達機場，並把最後採買時間算進去。"]
}
];

/* ============ 渲染 ============ */
const tabs = document.getElementById('tabs');
const main = document.getElementById('main');

const pageList = [
  {id:'prep', label:'📋 出發前準備'},
  ...days.map(d=>({id:'day'+d.day, label:'Day'+d.day}))
];

pageList.forEach((p,i)=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.textContent = p.label;
  btn.dataset.target = p.id;
  btn.onclick = ()=>showPage(p.id, true);
  tabs.appendChild(btn);
});

function renderPrep(){
  const wrap = document.createElement('div');
  wrap.className='page'; wrap.id='page-prep';
  wrap.innerHTML = `<div class="day-title-card"><div class="badge">出發必看</div><h2>📋 出發前注意事項</h2><div class="date">行李・防曬防蚊・預約提醒・行政醫療</div></div>`;
  prepData.groups.forEach(g=>{
    const card = document.createElement('div');
    card.className='card prep-card';
    card.innerHTML = `<h3><span class="icon">${g.icon}</span>${g.title}</h3><ul>${g.items.map(it=>`<li>${it}</li>`).join('')}</ul>`;
    wrap.appendChild(card);
  });
  return wrap;
}

function renderDay(d, idx){
  const wrap = document.createElement('div');
  wrap.className='page'; wrap.id='page-day'+d.day;

  wrap.innerHTML = `<div class="day-title-card">
      <div class="badge">Day ${d.day} ・ ${d.date}</div>
      <h2>${d.title}</h2>
    </div>`;

  const tcard = document.createElement('div');
  tcard.className='card';
  tcard.innerHTML = `<h3><span class="icon">🗓️</span>行程時間軸</h3>
    <div class="timeline">${d.timeline.map(t=>`
      <div class="t-item">
        <div class="t-time">${t.time}</div>
        <div class="t-title"><span class="e">${t.e}</span>${t.title}</div>
        <div class="t-desc">${t.desc}</div>
      </div>`).join('')}</div>`;
  wrap.appendChild(tcard);

  if(d.food.length){
    const c = document.createElement('div');
    c.className='card';
    c.innerHTML = `<h3><span class="icon">🍜</span>美食推薦</h3><div class="chips">${d.food.map(f=>`<span class="chip">${f}</span>`).join('')}</div>`;
    // if items contain long html (with <b>), render as list instead
    if(d.food.some(f=>f.length>40)){
      c.innerHTML = `<h3><span class="icon">🍜</span>美食推薦</h3><ul>${d.food.map(f=>`<li>${f}</li>`).join('')}</ul>`;
    }
    wrap.appendChild(c);
  }

  if(d.shopping.length){
    const c = document.createElement('div');
    c.className='card';
    if(d.shopping.some(f=>f.length>40)){
      c.innerHTML = `<h3><span class="icon">🛍️</span>購物清單</h3><ul>${d.shopping.map(f=>`<li>${f}</li>`).join('')}</ul>`;
    } else {
      c.innerHTML = `<h3><span class="icon">🛍️</span>購物清單</h3><div class="chips">${d.shopping.map(f=>`<span class="chip orange">${f}</span>`).join('')}</div>`;
    }
    wrap.appendChild(c);
  }

  if(d.tips.length){
    const c = document.createElement('div');
    c.className='card';
    c.innerHTML = `<h3><span class="icon">💡</span>10人團體小撇步 / 注意事項</h3>${d.tips.map(t=>`<div class="tip-box">${t}</div>`).join('')}`;
    wrap.appendChild(c);
  }

  // nav buttons
  const nav = document.createElement('div');
  nav.className='day-nav';
  const prevId = idx===0 ? 'prep' : 'day'+days[idx-1].day;
  const prevLabel = idx===0 ? '⬅ 出發前準備' : '⬅ Day'+days[idx-1].day;
  let navHtml = `<button onclick="showPage('${prevId}',true)">${prevLabel}</button>`;
  if(idx < days.length-1){
    const nextId = 'day'+days[idx+1].day;
    const nextLabel = 'Day'+days[idx+1].day+' ➡';
    navHtml += `<button onclick="showPage('${nextId}',true)">${nextLabel}</button>`;
  }
  nav.innerHTML = navHtml;
  wrap.appendChild(nav);

  return wrap;
}

main.appendChild(renderPrep());
days.forEach((d,i)=>main.appendChild(renderDay(d,i)));

function showPage(id, scrollTop){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.target===id));
  // scroll active tab into view
  const activeBtn = document.querySelector('.tab-btn.active');
  if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  if(scrollTop) window.scrollTo({top:0, behavior:'smooth'});
}
showPage('prep', false);

/* ============ 左右滑動切換頁籤 ============ */
let touchStartX = 0, touchStartY = 0;
main.addEventListener('touchstart', (e)=>{
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, {passive:true});

main.addEventListener('touchend', (e)=>{
  const touchEndX = e.changedTouches[0].screenX;
  const touchEndY = e.changedTouches[0].screenY;
  const dx = touchEndX - touchStartX;
  const dy = touchEndY - touchStartY;
  const minSwipeDist = 60;
  // 水平滑動距離需大於垂直滑動距離，避免與上下捲動衝突
  if(Math.abs(dx) > minSwipeDist && Math.abs(dx) > Math.abs(dy) * 1.5){
    const activeBtn = document.querySelector('.tab-btn.active');
    const currentId = activeBtn ? activeBtn.dataset.target : pageList[0].id;
    const idx = pageList.findIndex(p=>p.id===currentId);
    if(dx < 0 && idx < pageList.length - 1){
      showPage(pageList[idx+1].id, true); // 向左滑 ➔ 下一頁
    } else if(dx > 0 && idx > 0){
      showPage(pageList[idx-1].id, true); // 向右滑 ➔ 上一頁
    }
  }
}, {passive:true});

/* ============ 搜尋 ============ */
const searchBox = document.getElementById('searchBox');
searchBox.addEventListener('input', ()=>{
  const kw = searchBox.value.trim();
  document.querySelectorAll('.t-item, .card li, .acc-body li, .hotel-card').forEach(el=>{
    el.style.outline = '';
    el.style.background = '';
  });
  if(!kw) return;
  const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
  document.querySelectorAll('.page').forEach(page=>{
    let found = false;
    page.querySelectorAll('.t-item, .card li, .acc-body li, .hotel-card').forEach(el=>{
      if(re.test(el.textContent)){
        el.style.background = '#FFF59D';
        el.style.outline = '2px solid #FFB300';
        found = true;
        if(page.classList.contains('active')===false){
          // expand accordion if needed
          const acc = el.closest('.acc');
          if(acc) acc.classList.add('open');
        }
      }
    });
  });
});
</script>
